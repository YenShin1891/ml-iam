# Example run config for LSTM
# Usage (after implementation): make train RUN=configs/runs/lstm_example.yaml

model: lstm

dataset: null

cuda_visible_devices:
  default: "0"
  search: "0,1,2,3"
  train: "0"
  test: "0"
  plot: "0"

# LSTM-specific: whether to require full lag history
lag_required: false

phases: [search, train, test, plot]

# If true, skip hyperparameter search and use default params from configs/models/lstm.py
skip_search: false

note: ""
