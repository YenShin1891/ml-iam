# Example run config for TFT
# Usage: make train RUN=configs/runs/tft_example.yaml

model: tft

dataset: pipeline-min10100-comp0.4-out=9vars-exclude-year-apply-base-year-interp-targets-scale-impute-2026-04-23

cuda_visible_devices:
  default: "0,1,2,3,4,5"
  search: "0,1,2,3,4,5"
  train: "0,1,2,3,4,5"

# TFT-specific: whether to require full lag history
lag_required: true

# TFT-specific: enable two-window prediction mode
# (affects test phase only)
two_window: true

# Omit 'search' to skip hyperparameter search and use defaults instead.
phases: [preprocess, search, train, test, plot]

# To resume an existing run, set run_id and resume (overrides 'phases'):
run_id: tft_01        # existing run ID under results/tft/
resume: search         # phase to resume from (preprocess, search, train, test, plot)
