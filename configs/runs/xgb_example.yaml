# Example run config for XGBoost
# Usage (after implementation): make train RUN=configs/runs/xgb_example.yaml

model: xgb

# Optional: processed dataset version name under DATA_PATH/<version>/processed_series.csv
# Example: pipeline-min10100-comp0.4-out=9vars-apply-base-year-2025-09-26
# dataset: pipeline-...

dataset: null

# Optional: GPUs to expose for this run.
# You can set a single value (applies to all phases) or a per-phase mapping.
cuda_visible_devices:
  default: "0"          # used when a phase key is not specified
  search: "0,1,2,3"     # multi-GPU search
  train: "0"            # single GPU train
  test: "0"             # single GPU test
  plot: "0"             # single GPU plot

# Run phases in order. Typical: [search, train, test, plot]
phases: [search, train, test, plot]

# If true, skip hyperparameter search but still do preprocessing.
# For xgb this will use default params from configs/models/xgb_search.py.
skip_search: false

# Optional note saved into session state (supported by xgb launcher)
note: ""
